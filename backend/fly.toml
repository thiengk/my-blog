# Fly.io Configuration for Personal Blog API Server
# Documentation: https://fly.io/docs/reference/configuration/
#
# Before deploying, set your app name:
#   fly launch --name your-app-name
#
# Set secrets (sensitive environment variables):
#   fly secrets set DATABASE_URL="postgres://..."
#   fly secrets set REDIS_URL="rediss://..."

app = "personal-blog-api"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

# Environment variables (non-sensitive defaults)
# Sensitive values (DATABASE_URL, REDIS_URL) should be set via `fly secrets set`
[env]
  PORT = "8080"
  ENVIRONMENT = "production"
  CORS_ORIGINS = "https://your-blog-domain.pages.dev"
  DB_MAX_CONNS = "10"
  DB_MIN_CONNS = "2"
  DB_MAX_CONN_LIFE = "30m"
  RATE_LIMIT_PUBLIC = "100"
  RATE_LIMIT_NEWSLETTER = "10"
  RATE_LIMIT_WINDOW = "1m"

# HTTP service configuration
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

# Health check configuration
[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"

# Machine sizing (shared-cpu-1x is free tier eligible)
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1

# Auto-scaling configuration
# Fly Machines auto-scaling: min 1, max 3
# Scaling is handled by auto_stop_machines + auto_start_machines
# Additional machines can be added with: fly scale count 3
